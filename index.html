<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blooket TD Clone</title>
    <style>
        :root {
            --purple: #8e44ad;
            --dark-purple: #732d91;
            --wood-dark: #633324;
            --wood-light: #8b5a2b;
            --grass-light: #52c234;
            --grass-dark: #009e49;
            --path-color: #8b4513;
            --ui-font: 'Arial Black', Gadget, sans-serif;
        }

        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: var(--ui-font);
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 1100px;
            height: 750px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Top Bar */
        #header {
            height: 60px;
            background: var(--purple);
            border-bottom: 5px solid var(--dark-purple);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px;
            gap: 40px;
            font-size: 28px;
        }

        .stat-icon {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Main Game Area */
        #game-main {
            display: flex;
            flex: 1;
        }

        #canvas-holder {
            position: relative;
            background: cadetblue;
            flex: 1;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            background: var(--wood-dark);
            border-left: 6px solid #4a261c;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .round-card {
            background: #e74c3c;
            border: 4px solid #c0392b;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        #blook-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .blook-option {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.1s;
        }

        .blook-option:hover { background: rgba(255,255,255,0.1); }
        .blook-option.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }

        .blook-box {
            width: 60px;
            height: 60px;
            background: #fff;
            margin: 0 auto 5px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .cost-tag {
            background: #2980b9;
            font-size: 14px;
            border-radius: 5px;
            padding: 2px 0;
            display: block;
        }

        #start-btn {
            background: #3498db;
            border: none;
            border-bottom: 6px solid #2980b9;
            color: white;
            padding: 15px;
            font-size: 24px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #start-btn:active {
            transform: translateY(2px);
            border-bottom-width: 4px;
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- TOP UI -->
        <div id="header">
            <div class="stat-icon"><span id="gold">100</span> <span style="color: #f1c40f;">🪙</span></div>
            <div class="stat-icon"><span id="lives">100</span> <span style="color: #e74c3c;">❤️</span></div>
        </div>

        <div id="game-main">
            <!-- CANVAS AREA -->
            <div id="canvas-holder">
                <canvas id="gameCanvas" width="820" height="690"></canvas>
                <div id="game-over">
                    <h1 style="font-size: 60px; color: #e74c3c;">GAME OVER</h1>
                    <p style="font-size: 24px;">You reached Round <span id="final-round">0</span></p>
                    <button onclick="location.reload()" style="padding: 15px 30px; border-radius: 10px; border:none; background: #3498db; color:white; font-size: 20px; cursor:pointer;">RESTART</button>
                </div>
            </div>

            <!-- SIDEBAR UI -->
            <div id="sidebar">
                <div class="round-card">Round <span id="round">1</span></div>
                
                <div id="blook-grid">
                    <!-- Blooks will be injected here -->
                </div>

                <div style="font-size: 14px; text-align: center; color: #bdc3c7;">
                    Click a Blook, then click the grid to place!
                </div>

                <button id="start-btn" onclick="startWave()">
                    <span>▶️</span> x1
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Constants
        const TILE_SIZE = 45;
        const GRID_W = 18;
        const GRID_H = 15;

        // Assets / Emojis as Blooks
        const TOWER_TYPES = [
            { id: 0, name: "Chick", icon: "🐥", cost: 30, range: 100, damage: 6, rate: 30, color: "#f1c40f" },
            { id: 1, name: "Squirrel", icon: "🐿️", cost: 40, range: 130, damage: 12, rate: 45, color: "#e67e22" },
            { id: 2, name: "Owl", icon: "🦉", cost: 60, range: 160, damage: 9, rate: 20, color: "#9b59b6" },
            { id: 3, name: "Pig", icon: "🐷", cost: 50, range: 110, damage: 15, rate: 50, color: "#ff9ff3" },
            { id: 4, name: "Slime", icon: "👽", cost: 80, range: 200, damage: 5, rate: 15, color: "#1dd1a1" },
            { id: 5, name: "Dragon", icon: "🐉", cost: 150, range: 250, damage: 45, rate: 70, color: "#ee5253" },
            { id: 6, name: "Cat", icon: "🐱", cost: 30, range: 90, damage: 5, rate: 25, color: "#feca57" },
            { id: 7, name: "Wolf", icon: "🐺", cost: 70, range: 140, damage: 20, rate: 40, color: "#54a0ff" },
            { id: 8, name: "Bird", icon: "🦜", cost: 100, range: 180, damage: 14, rate: 10, color: "#10ac84" }
        ];

        // Game State
        let gold = 100;
        let lives = 100;
        let round = 1;
        let isGameOver = false;
        let waveActive = false;
        let enemySpawning = false;
        let selectedBlookIdx = -1;
        
        let towers = [];
        let enemies = [];
        let projectiles = [];

        // Define Path (Grid coords)
        const gridPath = [
            {x: 2, y: 0}, {x: 2, y: 3}, {x: 10, y: 3}, {x: 10, y: 8},
            {x: 4, y: 8}, {x: 4, y: 12}, {x: 15, y: 12}, {x: 15, y: 6},
            {x: 17, y: 6}
        ];
        
        // Convert to Pixels
        const pixelPath = gridPath.map(p => ({ x: p.x * TILE_SIZE + TILE_SIZE/2, y: p.y * TILE_SIZE + TILE_SIZE/2 }));

        // Grid Occupancy
        const occupied = Array(GRID_H).fill().map(() => Array(GRID_W).fill(false));
        // Mark path as occupied
        function markPath() {
            for(let i=0; i < gridPath.length - 1; i++) {
                let start = gridPath[i];
                let end = gridPath[i+1];
                let xMin = Math.min(start.x, end.x);
                let xMax = Math.max(start.x, end.x);
                let yMin = Math.min(start.y, end.y);
                let yMax = Math.max(start.y, end.y);
                for(let y = yMin; y <= yMax; y++) {
                    for(let x = xMin; x <= xMax; x++) {
                        occupied[y][x] = true;
                    }
                }
            }
        }
        markPath();

        // UI Setup
        function initUI() {
            const grid = document.getElementById('blook-grid');
            TOWER_TYPES.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'blook-option';
                div.id = `blook-${i}`;
                div.onclick = () => selectBlook(i);
                div.innerHTML = `
                    <div class="blook-box">${t.icon}</div>
                    <span class="cost-tag">${t.cost}</span>
                `;
                grid.appendChild(div);
            });
            updateStats();
        }

        function selectBlook(i) {
            selectedBlookIdx = i;
            document.querySelectorAll('.blook-option').forEach(el => el.classList.remove('selected'));
            document.getElementById(`blook-${i}`).classList.add('selected');
        }

        function updateStats() {
            document.getElementById('gold').innerText = Math.floor(gold);
            document.getElementById('lives').innerText = lives;
            document.getElementById('round').innerText = round;
        }

        // --- Game Classes ---

        class Enemy {
            constructor() {
                this.x = pixelPath[0].x;
                this.y = pixelPath[0].y;
                this.targetIdx = 1;
                this.maxHp = 20 + (round * 15);
                this.hp = this.maxHp;
                this.speed = 1.5 + (round * 0.04);
                this.size = 30;
                this.reward = 5;
            }

            update() {
                const target = pixelPath[this.targetIdx];
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < this.speed) {
                    this.targetIdx++;
                    if (this.targetIdx >= pixelPath.length) {
                        lives -= 5;
                        this.hp = -1; // Flag for removal
                        updateStats();
                        if (lives <= 0) doGameOver();
                    }
                } else {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed;
                }
            }

            draw() {
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(this.x - 12, this.y - 12, 24, 24);
                // Body
                ctx.font = "24px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("📦", this.x, this.y);
                // HP Bar
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp/this.maxHp), 4);
            }
        }

        class Tower {
            constructor(gx, gy, type) {
                this.gx = gx;
                this.gy = gy;
                this.x = gx * TILE_SIZE + TILE_SIZE/2;
                this.y = gy * TILE_SIZE + TILE_SIZE/2;
                this.type = {...type};
                this.cooldown = 0;
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.cooldown <= 0) {
                    const target = enemies.find(e => {
                        const d = Math.sqrt((e.x - this.x)**2 + (e.y - this.y)**2);
                        return d < this.type.range;
                    });
                    if (target) {
                        projectiles.push(new Projectile(this.x, this.y, target, this.type));
                        this.cooldown = this.type.rate;
                    }
                }
            }

            draw() {
                // Background Tile
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(this.gx * TILE_SIZE + 2, this.gy * TILE_SIZE + 2, TILE_SIZE-4, TILE_SIZE-4);
                // Icon
                ctx.font = "32px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.type.icon, this.x, this.y);
            }
        }

        class Projectile {
            constructor(x, y, target, type) {
                this.x = x; this.y = y; this.target = target;
                this.speed = 8;
                this.damage = type.damage;
                this.color = type.color;
                this.dead = false;
            }

            update() {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < this.speed) {
                    this.target.hp -= this.damage;
                    this.dead = true;
                } else {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // --- Interaction ---

        canvas.addEventListener('click', (e) => {
            if (isGameOver || selectedBlookIdx === -1) return;
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - rect.left) / TILE_SIZE);
            const gy = Math.floor((e.clientY - rect.top) / TILE_SIZE);

            if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return;

            if (!occupied[gy][gx]) {
                const type = TOWER_TYPES[selectedBlookIdx];
                if (gold >= type.cost) {
                    gold -= type.cost;
                    towers.push(new Tower(gx, gy, type));
                    occupied[gy][gx] = true;
                    updateStats();
                }
            }
        });

        // --- Core Loops ---

        function drawMap() {
            // Grass Tiling
            for(let y=0; y<GRID_H; y++) {
                for(let x=0; x<GRID_W; x++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#52c234' : '#45b62b';
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }

            // Path
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = TILE_SIZE;
            ctx.lineCap = 'square';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(pixelPath[0].x, pixelPath[0].y);
            for(let i=1; i<pixelPath.length; i++) ctx.lineTo(pixelPath[i].x, pixelPath[i].y);
            ctx.stroke();

            // Decorative inner path
            ctx.strokeStyle = '#a0522d';
            ctx.lineWidth = TILE_SIZE - 10;
            ctx.stroke();
        }

        function startWave() {
            if (waveActive || enemySpawning) return;
            waveActive = true;
            enemySpawning = true;
            let count = 5 + round * 3;
            let spawned = 0;
            const intv = setInterval(() => {
                if (isGameOver) { clearInterval(intv); return; }
                enemies.push(new Enemy());
                spawned++;
                if (spawned >= count) {
                    clearInterval(intv);
                    enemySpawning = false;
                }
            }, 600);
        }

        function doGameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-round').innerText = round;
        }

        function gameLoop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMap();

            // Towers
            towers.forEach(t => { t.update(); t.draw(); });

            // Enemies
            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => {
                e.update();
                e.draw();
                // Check if killed to give gold
                if (e.hp <= 0 && e.targetIdx < pixelPath.length) {
                    gold += e.reward;
                    updateStats();
                }
            });

            // Projectiles
            projectiles = projectiles.filter(p => !p.dead && p.target.hp > 0);
            projectiles.forEach(p => { p.update(); p.draw(); });

            // End of round check
            if (waveActive && enemies.length === 0 && !enemySpawning) {
                waveActive = false;
                round++;
                gold += 50; // Round bonus
                updateStats();
            }

            requestAnimationFrame(gameLoop);
        }

        // Init
        initUI();
        gameLoop();
    </script>
</body>
</html>
