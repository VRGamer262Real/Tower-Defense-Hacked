<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blook Defense Clone</title>
    <style>
        :root {
            --purple: #8e44ad;
            --dark-purple: #703688;
            --wood: #a0522d;
            --light-wood: #cd853f;
            --grass: #2ecc71;
            --grass-dark: #27ae60;
            --path: #d35400;
        }

        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            width: 1000px;
            height: 700px;
            border: 8px solid #34495e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Top Bar */
        #top-bar {
            height: 60px;
            background: var(--purple);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 4px solid var(--dark-purple);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Main Area */
        #main-area {
            display: flex;
            flex: 1;
        }

        #canvas-container {
            position: relative;
            background: var(--grass);
            flex: 1;
        }

        canvas {
            display: block;
        }

        /* Sidebar */
        #sidebar {
            width: 240px;
            background: var(--wood);
            border-left: 6px solid var(--light-wood);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .round-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            color: white;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .tower-option {
            background: var(--light-wood);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
            color: white;
        }

        .tower-option:hover { transform: scale(1.02); }
        .tower-option.selected { border-color: #f1c40f; background: #e67e22; }
        
        .tower-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .tower-details b { display: block; font-size: 16px; }
        .tower-details span { font-size: 14px; color: #ffd700; font-weight: bold; }

        #msg {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="top-bar">
            <div class="stat-item">🛡️ Defense</div>
            <div style="display: flex; gap: 30px;">
                <div class="stat-item">💰 <span id="gold">150</span></div>
                <div class="stat-item">❤️ <span id="lives">100</span></div>
            </div>
        </div>

        <div id="main-area">
            <div id="canvas-container">
                <canvas id="gameCanvas" width="760" height="640"></canvas>
                <div id="msg">Not enough gold!</div>
                <div id="game-over">
                    <h1 style="font-size: 60px; margin-bottom: 10px;">GAME OVER</h1>
                    <p id="final-round" style="font-size: 24px;">You reached Round 1</p>
                    <button onclick="location.reload()" style="padding: 15px 40px; font-size: 20px; cursor:pointer; background: var(--purple); color: white; border:none; border-radius: 10px; margin-top:20px;">Play Again</button>
                </div>
            </div>

            <div id="sidebar">
                <div class="round-info">Round: <span id="round">1</span></div>
                
                <div class="tower-option" onclick="selectTower(0)" id="t0">
                    <div class="tower-icon">🐥</div>
                    <div class="tower-details"><b>Chick</b> <span>30 Gold</span></div>
                </div>
                <div class="tower-option" onclick="selectTower(1)" id="t1">
                    <div class="tower-icon">🐿️</div>
                    <div class="tower-details"><b>Squirrel</b> <span>50 Gold</span></div>
                </div>
                <div class="tower-option" onclick="selectTower(2)" id="t2">
                    <div class="tower-icon">🦉</div>
                    <div class="tower-details"><b>Owl</b> <span>80 Gold</span></div>
                </div>
                <div class="tower-option" onclick="selectTower(3)" id="t3">
                    <div class="tower-icon">🐉</div>
                    <div class="tower-details"><b>Dragon</b> <span>150 Gold</span></div>
                </div>

                <div style="margin-top:auto; color: rgba(255,255,255,0.5); font-size: 12px; text-align: center;">
                    Click a Blook, then click the grass to place!
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game State
        let gold = 150;
        let lives = 100;
        let round = 1;
        let enemies = [];
        let towers = [];
        let projectiles = [];
        let selectedTowerIdx = -1;
        let isGameOver = false;
        let waveInProgress = false;

        const TILE_SIZE = 40;
        const GRID_W = 19; 
        const GRID_H = 16;

        const TOWER_TYPES = [
            { name: "Chick", icon: "🐥", cost: 30, range: 100, damage: 5, fireRate: 40, color: '#f1c40f' },
            { name: "Squirrel", icon: "🐿️", cost: 50, range: 130, damage: 12, fireRate: 50, color: '#e67e22' },
            { name: "Owl", icon: "🦉", cost: 80, range: 160, damage: 8, fireRate: 20, color: '#9b59b6' },
            { name: "Dragon", icon: "🐉", cost: 150, range: 200, damage: 35, fireRate: 80, color: '#e74c3c' }
        ];

        // Complex winding path (Grid coordinates)
        const gridPath = [
            {x: 0, y: 3}, {x: 14, y: 3}, {x: 14, y: 7}, {x: 4, y: 7}, 
            {x: 4, y: 11}, {x: 18, y: 11}, {x: 18, y: 14}, {x: 10, y: 14}
        ];
        
        // Convert to pixels for logic
        const path = gridPath.map(p => ({ x: p.x * TILE_SIZE + 20, y: p.y * TILE_SIZE + 20 }));

        function drawBackground() {
            // Checkered Grass
            for(let i=0; i<GRID_W; i++) {
                for(let j=0; j<GRID_H; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#2ecc71' : '#27ae60';
                    ctx.fillRect(i * TILE_SIZE, j * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }

            // Path
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 36;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for(let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.stroke();

            // Path Borders
            ctx.strokeStyle = '#a04000';
            ctx.lineWidth = 40;
            ctx.globalAlpha = 0.3;
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        class Enemy {
            constructor() {
                this.x = path[0].x;
                this.y = path[0].y;
                this.targetIdx = 1;
                this.maxHp = 15 + (round * 12);
                this.hp = this.maxHp;
                this.speed = 1.2 + (round * 0.05);
                this.icon = ["🏠", "📦", "球", "🎈"][Math.floor(Math.random()*4)];
            }

            update() {
                const target = path[this.targetIdx];
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < this.speed) {
                    this.targetIdx++;
                    if (this.targetIdx >= path.length) {
                        lives -= 5;
                        this.hp = -1;
                        updateUI();
                        if (lives <= 0) gameOver();
                    }
                } else {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed;
                }
            }

            draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(this.x-15, this.y-15, 30, 30);
                
                ctx.font = "24px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("📦", this.x, this.y);

                // HP Bar
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(this.x-15, this.y-22, 30, 4);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(this.x-15, this.y-22, 30 * (this.hp/this.maxHp), 4);
            }
        }

        class Tower {
            constructor(gx, gy, type) {
                this.x = gx * TILE_SIZE + 20;
                this.y = gy * TILE_SIZE + 20;
                this.type = type;
                this.cooldown = 0;
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.cooldown <= 0) {
                    const target = enemies.find(e => {
                        const d = Math.sqrt((e.x-this.x)**2 + (e.y-this.y)**2);
                        return d < this.type.range;
                    });
                    if (target) {
                        projectiles.push(new Projectile(this.x, this.y, target, this.type));
                        this.cooldown = this.type.fireRate;
                    }
                }
            }

            draw() {
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.type.icon, this.x, this.y);
            }
        }

        class Projectile {
            constructor(x, y, target, type) {
                this.x = x; this.y = y; this.target = target;
                this.type = type; this.speed = 7;
                this.dead = false;
            }

            update() {
                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < this.speed) {
                    this.target.hp -= this.type.damage;
                    this.dead = true;
                } else {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed;
                }
            }

            draw() {
                ctx.fillStyle = this.type.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 5, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function selectTower(idx) {
            selectedTowerIdx = idx;
            document.querySelectorAll('.tower-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('t' + idx).classList.add('selected');
        }

        canvas.addEventListener('click', (e) => {
            if (selectedTowerIdx === -1 || isGameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const gx = Math.floor((e.clientX - rect.left) / TILE_SIZE);
            const gy = Math.floor((e.clientY - rect.top) / TILE_SIZE);

            const type = TOWER_TYPES[selectedTowerIdx];

            // Validate placement (not on existing tower)
            const exists = towers.find(t => Math.floor(t.x/TILE_SIZE) === gx && Math.floor(t.y/TILE_SIZE) === gy);
            if (exists) return;

            if (gold >= type.cost) {
                gold -= type.cost;
                towers.push(new Tower(gx, gy, type));
                updateUI();
            } else {
                showMsg("Not enough gold!");
            }
        });

        function showMsg(txt) {
            const m = document.getElementById('msg');
            m.innerText = txt;
            m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function updateUI() {
            document.getElementById('gold').innerText = gold;
            document.getElementById('lives').innerText = lives;
            document.getElementById('round').innerText = round;
        }

        function spawnWave() {
            waveInProgress = true;
            let count = 5 + round * 2;
            let spawned = 0;
            const interval = setInterval(() => {
                if (isGameOver) { clearInterval(interval); return; }
                enemies.push(new Enemy());
                spawned++;
                if (spawned >= count) {
                    clearInterval(interval);
                    waveInProgress = false;
                }
            }, 800);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-round').innerText = `You reached Round ${round}`;
        }

        function loop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            towers.forEach(t => { t.update(); t.draw(); });

            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => { e.update(); e.draw(); });

            projectiles = projectiles.filter(p => !p.dead);
            projectiles.forEach(p => { p.update(); p.draw(); });

            // Detect enemy kills for gold
            enemies.forEach(e => {
                if(e.hp <= 0 && e.targetIdx < path.length) {
                    gold += 15;
                    updateUI();
                }
            });

            if (enemies.length === 0 && !waveInProgress) {
                round++;
                updateUI();
                spawnWave();
            }

            requestAnimationFrame(loop);
        }

        // Init
        updateUI();
        spawnWave();
        loop();
    </script>
</body>
</html>
