<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Hacked</title>
    <style>
        :root {
            --purple-ui: #a44cd3;
            --dark-purple: #8639b1;
            --sidebar-wood: #7d4d2d;
            --sidebar-inner: #5d361b;
            --ui-font: 'Arial Black', Gadget, sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #111;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: var(--ui-font);
        }

        /* 16:9 Scalable Container */
        #game-scaler {
            width: 2560px;
            height: 1440px;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            position: relative;
            transform-origin: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        /* Header matching Blooket style */
        #header {
            height: 75px;
            background: var(--purple-ui);
            border-bottom: 8px solid var(--dark-purple);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 50px;
            z-index: 100;
        }

        .gold-box { font-size: 48px; color: white; display: flex; align-items: center; gap: 15px; }

        /* Main Game Area */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        #canvas-holder { position: relative; flex: 1; background: #3498db; }
        canvas { display: block; }

        /* Wooden Sidebar */
        #sidebar {
            width: 380px;
            background: var(--sidebar-wood);
            border-left: 10px solid var(--sidebar-inner);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.4);
        }

        .hud-top { display: flex; align-items: center; justify-content: space-between; }
        
        .life-bar-wrap {
            width: 220px; height: 45px; background: #333;
            border-radius: 12px; border: 5px solid var(--sidebar-inner);
            position: relative; overflow: hidden;
        }
        #life-fill { width: 100%; height: 100%; background: #3498db; transition: width 0.3s; }
        .life-txt { position: absolute; width:100%; text-align:center; top:5px; color:white; font-size:26px; }

        .round-card {
            background: rgba(0,0,0,0.3); border: 6px solid var(--sidebar-inner);
            border-radius: 20px; padding: 12px; text-align: center;
            font-size: 45px; color: white; margin: 5px 0;
        }

        #blook-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; background: rgba(0,0,0,0.2);
            padding: 12px; border-radius: 15px;
            overflow-y: auto; max-height: 520px;
        }

        .blook-slot {
            background: rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 5px; text-align: center; cursor: pointer;
            border: 4px solid transparent; transition: 0.1s;
        }
        .blook-slot:hover { background: rgba(255, 255, 255, 0.15); }
        .blook-slot.active { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }

        .f-icon-box {
            width: 70px; height: 70px; background: #fff;
            margin: 0 auto 5px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; box-shadow: 0 5px 0 rgba(0,0,0,0.3);
        }
        .f-cost-label { background: #3498db; color: white; display: block; border-radius: 8px; font-size: 18px; }

        /* Buttons & Popups */
        .game-btn {
            background: #3498db; border: none; border-bottom: 8px solid #2980b9;
            color: white; padding: 15px; font-size: 36px; border-radius: 20px;
            cursor: pointer; font-family: var(--ui-font);
        }
        .game-btn:active { transform: translateY(5px); border-bottom-width: 5px; }

        #ctx-panel {
            background: rgba(0,0,0,0.85); border-radius: 25px;
            padding: 20px; display: none; flex-direction: column;
            gap: 12px; border: 4px solid white;
        }

        #speed-toggle { margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 500; gap: 30px;
        }
    </style>
</head>
<body>

    <div id="game-scaler">
        <!-- Start / Difficulty Screen -->
        <div id="start-screen" class="overlay">
            <h1 style="font-size: 90px; color:white; text-shadow: 5px 5px var(--dark-purple);">FIGHTER DEFENSE</h1>
            <p style="font-size: 32px; color: #ccc;">Select Difficulty</p>
            <div style="display: flex; gap: 20px;">
                <button class="game-btn" style="background:#2ecc71; border-color:#27ae60" onclick="startGame('easy')">EASY</button>
                <button class="game-btn" onclick="startGame('normal')">NORMAL</button>
                <button class="game-btn" style="background:#e74c3c; border-color:#c0392b" onclick="startGame('hard')">HARD</button>
            </div>
        </div>

        <!-- Defeat Screen -->
        <div id="defeat-screen" class="overlay" style="display:none">
            <h1 style="font-size: 120px; color:#e74c3c">DEFEAT</h1>
            <p style="font-size: 40px; color:white">Round Reached: <span id="res-round">1</span></p>
            <button class="game-btn" style="width: 350px" onclick="location.reload()">TRY AGAIN</button>
        </div>

        <div id="header">
            <div class="gold-box"><span id="gold-val">400000000</span> <span style="color:#f1c40f">🪙</span></div>
        </div>

        <div id="main-container">
            <div id="canvas-holder">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div id="sidebar">
                <div class="hud-top">
                    <div class="life-bar-wrap">
                        <div id="life-fill"></div>
                        <div class="life-txt"><span id="health-val">10000</span> ❤️</div>
                    </div>
                </div>

                <div class="round-card">Round <span id="round-val">1</span></div>

                <div id="blook-grid"></div>

                <!-- Seller / Upgrade Menu -->
                <div id="ctx-panel">
                    <div id="ctx-name" style="color:#f1c40f; font-size: 32px;">Blook</div>
                    <div id="ctx-meta" style="color:#ddd; font-size: 18px;">Level 1</div>
                    <button class="game-btn" style="font-size: 22px; padding: 10px" onclick="upgradeSelected()">UPGRADE (<span id="up-cost">1</span>)</button>
                    <div style="display: flex; gap: 10px;">
                        <button class="game-btn" style="flex:1; background:#e67e22; border-color:#d35400; font-size:20px" onclick="sellSelected()">SELL (<span id="sell-val">99990</span>)</button>
                        <button class="game-btn" style="flex:1; background:#e74c3c; border-color:#c0392b; font-size:20px" onclick="closeCtx()">CLOSE</button>
                    </div>
                </div>

                <button id="speed-toggle" class="game-btn" onclick="toggleSpeed()">
                    <span id="spd-icon">▶️</span> <span id="spd-txt">x1</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const scaler = document.getElementById('game-scaler');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gold = 400000000; let health = 10000; let round = 1; let gameSpeed = 1;
        let isRunning = false; let waveActive = false; let over = false;
        let shopSelection = -1; let activeFighter = null;
        let diffMult = 1;

        let fighters = []; let enemies = []; let projectiles = [];
        const TILE = 72; const GW = 22; const GH = 14; 
        let path = [];

        const DATA = [
            { icon: "🐥", name: "Chick", cost: 3, range: 1600, dmg: 100, rate: 455, col: "#f1c40f" },
            { icon: "🐿️", name: "Squirrel", cost: 5, range: 1900, dmg: 180, rate: 500, col: "#e67e22" },
            { icon: "🦍", name: "Gorilla", cost: 7, range: 2200, dmg: 250, rate: 555, col: "#5f27cd" },
            { icon: "🐉", name: "Dragon", cost: 2, range: 4500, dmg: 1400, rate: 1200, col: "#e74c3c" },
            { icon: "🦉", name: "Owl", cost: 6, range: 2400, dmg: 120, rate: 250, col: "#34495e" },
            { icon: "🐱", name: "Cat", cost: 3, range: 1500, dmg: 80, rate: 350, col: "#f39c12" },
            { icon: "🐷", name: "Pig", cost: 5, range: 1800, dmg: 220, rate: 700, col: "#ff9ff3" },
            { icon: "🦌", name: "Deer", cost: 9, range: 2800, dmg: 400, rate: 600, col: "#bdc3c7" },
            { icon: "👽", name: "Alien", cost: 1, range: 3500, dmg: 200, rate: 150, col: "#1dd1a1" }
        ];

        function resize() {
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const s = Math.min(ww/1920, wh/1080);
            scaler.style.transform = `scale(${s})`;
            canvas.width = 2560 - 380;
            canvas.height = 1440 - 75;
        }

        function createPath() {
            path = [];
            let cx = 3, cy = 0;
            path.push({x: cx*TILE + TILE/2, y: -TILE});
            path.push({x: cx*TILE + TILE/2, y: cy*TILE + TILE/2});
            while (cx < 18 && cy < 11) {
                if (Math.random() > 0.5 && cx < 16) cx += Math.floor(Math.random()*4)+2;
                else cy += Math.floor(Math.random()*3)+2;
                path.push({x: cx*TILE + TILE/2, y: cy*TILE + TILE/2});
            }
            path.push({x: 1800, y: cy*TILE + TILE/2});
        }

        function startGame(mode) {
            document.getElementById('start-screen').style.display = 'none';
            if (mode === 'easy') { gold = 500; diffMult = 0.7; }
            else if (mode === 'hard') { gold = 300; diffMult = 1.5; }
            
            isRunning = true;
            init();
        }

        function init() {
            const grid = document.getElementById('blook-grid');
            DATA.forEach((f, i) => {
                const d = document.createElement('div');
                d.className = 'blook-slot';
                d.onclick = () => {
                    shopSelection = i; activeFighter = null;
                    document.getElementById('ctx-panel').style.display = 'none';
                    document.querySelectorAll('.blook-slot').forEach(s => s.classList.remove('active'));
                    d.classList.add('active');
                };
                d.innerHTML = `<div class="f-icon-box" style="background:${f.col}">${f.icon}</div><span class="f-cost-label">${f.cost}</span>`;
                grid.appendChild(d);
            });
            createPath();
            updateStats();
            loop();
        }

        /** CLICK COORDINATE FIX **/
        canvas.addEventListener('mousedown', (e) => {
            if (!isRunning || over) return;
            const rect = scaler.getBoundingClientRect();
            const s = 1920 / rect.width;
            
            // Logical XY inside 1920x1080 container
            const lx = (e.clientX - rect.left) * s;
            const ly = (e.clientY - rect.top) * s;

            // Offset by top header (75px logical)
            const my = ly - 75;
            const mx = lx;

            const targetGX = Math.floor(mx/TILE);
            const targetGY = Math.floor(my/TILE);

            const existing = fighters.find(f => f.gx === targetGX && f.gy === targetGY);
            if (existing) {
                openCtx(existing);
                return;
            }

            if (shopSelection !== -1) {
                const dat = DATA[shopSelection];
                if (gold >= dat.cost && !isPath(targetGX, targetGY) && targetGX > 2) {
                    gold -= dat.cost;
                    fighters.push(new Fighter(targetGX, targetGY, dat));
                    updateStats();
                }
            }
        });

        function isPath(gx, gy) {
            const px = gx*TILE + TILE/2, py = gy*TILE+TILE/2;
            for(let i=0; i < path.length-1; i++) {
                const v=path[i], w=path[i+1], l2=(v.x-w.x)**2+(v.y-w.y)**2;
                let t = Math.max(0, Math.min(1, ((px-v.x)*(w.x-v.x) + (py-v.y)*(w.y-v.y))/l2));
                const d = Math.hypot(px - (v.x + t*(w.x-v.x)), py - (v.y + t*(w.y-v.y)));
                if (d < TILE * 0.8) return true;
            }
            return false;
        }

        function toggleSpeed() {
            gameSpeed = gameSpeed === 1 ? 5 : 1;
            document.getElementById('spd-icon').innerText = gameSpeed === 1 ? '▶️' : '⏩';
            document.getElementById('spd-txt').innerText = 'x' + gameSpeed;
        }

        function openCtx(f) {
            activeFighter = f;
            shopSelection = -1;
            document.querySelectorAll('.blook-slot').forEach(s => s.classList.remove('active'));
            document.getElementById('ctx-panel').style.display = 'flex';
            document.getElementById('ctx-name').innerText = f.data.name;
            document.getElementById('ctx-meta').innerText = `Level ${f.lvl} | Power: ${Math.round(f.data.dmg)}`;
            document.getElementById('up-cost').innerText = f.lvl * 90;
            document.getElementById('sell-val').innerText = Math.floor(f.spent * 0.7);
        }

        function upgradeSelected() {
            if (!activeFighter) return;
            const cost = activeFighter.lvl * 90;
            if (gold >= cost) {
                gold -= cost; activeFighter.spent += cost;
                activeFighter.lvl++;
                activeFighter.data.dmg *= 1.6; activeFighter.data.range += 30; activeFighter.data.rate *= 0.9;
                openCtx(activeFighter); updateStats();
            }
        }

        function sellSelected() {
            if (!activeFighter) return;
            gold += Math.floor(activeFighter.spent * 0.7);
            fighters = fighters.filter(f => f !== activeFighter);
            closeCtx(); updateStats();
        }

        function closeCtx() { activeFighter = null; document.getElementById('ctx-panel').style.display = 'none'; }

        function updateStats() {
            document.getElementById('gold-val').innerText = Math.floor(gold);
            document.getElementById('health-val').innerText = Math.max(0, health);
            document.getElementById('life-fill').style.width = health + "%";
            document.getElementById('round-val').innerText = round;
        }

        class Enemy {
            constructor() {
                this.x = path[0].x; this.y = path[0].y;
                this.targetIdx = 1;
                this.maxHp = 60 + (round * 60 * diffMult);
                this.hp = this.maxHp;
                this.spd = 2.0 + (round * 0.05);
                this.icon = Math.random() > 0.85 ? "🧱" : "📦";
                if (this.icon === "🧱") { this.hp *= 3; this.maxHp *= 3; this.spd *= 0.7; }
            }
            update() {
                const g = path[this.targetIdx];
                const dx = g.x - this.x, dy = g.y - this.y, d = Math.hypot(dx, dy);
                const step = this.spd * gameSpeed;
                if (d < step) {
                    this.targetIdx++;
                    if (this.targetIdx >= path.length) {
                        health -= 5; this.hp = -10000; updateStats();
                        if (health <= 0) doGameOver();
                    }
                } else { this.x += (dx/d)*step; this.y += (dy/d)*step; }
            }
            draw() {
                ctx.font = "50px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.icon, this.x, this.y + 10);
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(this.x-30, this.y-45, 60, 8);
                ctx.fillStyle = "#2ecc71"; ctx.fillRect(this.x-30, this.y-45, 60 * (Math.max(0, this.hp/this.maxHp)), 8);
            }
        }

        class Fighter {
            constructor(gx, gy, d) {
                this.gx = gx; this.gy = gy;
                this.x = gx*TILE+TILE/2; this.y = gy*TILE+TILE/2;
                this.data = JSON.parse(JSON.stringify(d)); this.lvl = 1; this.cd = 0; this.spent = d.cost;
            }
            update() {
                if (this.cd > 0) this.cd -= gameSpeed;
                if (this.cd <= 0) {
                    const t = enemies.find(e => Math.hypot(e.x - this.x, e.y - this.y) < this.data.range);
                    if (t) {
                        projectiles.push(new Projectile(this.x, this.y, t, this.data.dmg, this.data.col));
                        this.cd = this.data.rate;
                    }
                }
            }
            draw() {
                ctx.save(); ctx.globalAlpha = 0.65; ctx.fillStyle = this.data.col;
                ctx.beginPath(); ctx.roundRect(this.x-32, this.y-32, 64, 64, 12); ctx.fill();
                ctx.globalAlpha = 1.0; ctx.font = "50px Arial"; ctx.textAlign = "center";
                ctx.textBaseline = "middle"; ctx.fillText(this.data.icon, this.x, this.y+4);
                if (activeFighter === this) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.data.range, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x,y,t,dmg,col) { this.x=x;this.y=y;this.t=t;this.dmg=dmg;this.col=col;this.dead=false; }
            update() {
                const dx=this.t.x-this.x, dy=this.t.y-this.y, d=Math.hypot(dx,dy), step=22*gameSpeed;
                if (d < step) {
                    this.t.hp -= this.dmg; 
                    gold += 0.5; // 1 COIN PER HIT
                    updateStats();
                    this.dead = true;
                } else { this.x+=(dx/d)*step; this.y+=(dy/d)*step; }
            }
            draw() {
                ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill();
            }
        }

        function doGameOver() { over = true; document.getElementById('defeat-screen').style.display = 'flex'; document.getElementById('res-round').innerText = round; }

        function loop() {
            if (!isRunning || over) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = "#3498db"; ctx.fillRect(0,0, canvas.width, canvas.height); // Sea
            ctx.fillStyle = "#8b4513"; ctx.fillRect(TILE*2, 0, TILE, canvas.height); // Cliff
            for(let y=0; y<GH; y++) for(let x=3; x<GW; x++) {
                ctx.fillStyle = (x+y)%2 === 0 ? "#2ecc71" : "#27ae60"; ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
            }
            // Path
            ctx.strokeStyle="#8b4513"; ctx.lineWidth=TILE+12; ctx.lineCap="round"; ctx.lineJoin="round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.strokeStyle="#a0522d"; ctx.lineWidth=TILE-8; ctx.stroke();

            fighters.forEach(f => { f.update(); f.draw(); });
            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => { e.update(); e.draw(); });
            projectiles = projectiles.filter(p => !p.dead && p.t.hp > 0);
            projectiles.forEach(p => { p.update(); p.draw(); });

            if (!waveActive && enemies.length === 0) {
                waveActive = true; let c=0, n = 10 + round*5;
                let t = setInterval(() => {
                    if (over) { clearInterval(t); return; }
                    enemies.push(new Enemy());
                    if (++c >= n) {
                        clearInterval(t); 
                        let ck = setInterval(() => {
                            if (enemies.length === 0) { 
                                clearInterval(ck); waveActive = false; round++; gold += round*50; updateStats(); 
                            }
                        }, 500);
                    }
                }, 1000 / gameSpeed);
            }
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
