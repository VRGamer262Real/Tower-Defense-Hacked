<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIGHTER DEFENSE - HACKED EDITION</title>
    <style>
        :root {
            --purple-ui: #a44cd3;
            --dark-purple: #8639b1;
            --sidebar-wood: #7d4d2d;
            --sidebar-inner: #5d361b;
            --hacker-green: #00ff41;
            --ui-font: 'Arial Black', Gadget, sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: var(--ui-font);
        }

        /* FIXED SCALING CONTAINER */
        #game-scaler {
            width: 1920px;
            height: 1080px;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        #header {
            height: 75px;
            background: var(--purple-ui);
            border-bottom: 8px solid var(--dark-purple);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 50px;
            z-index: 100;
        }

        .gold-box { font-size: 48px; color: white; display: flex; align-items: center; gap: 15px; }

        #main-container { display: flex; flex: 1; overflow: hidden; }

        #canvas-holder { position: relative; flex: 1; background: #3498db; }
        canvas { display: block; }

        #sidebar {
            width: 380px;
            background: var(--sidebar-wood);
            border-left: 10px solid var(--sidebar-inner);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.4);
        }

        /* Life bar styling */
        .life-bar-wrap {
            width: 100%; height: 45px; background: #333;
            border-radius: 12px; border: 5px solid var(--sidebar-inner);
            position: relative; overflow: hidden;
        }
        #life-fill { width: 100%; height: 100%; background: #31ed3e; transition: width 0.3s; }
        .life-txt { position: absolute; width:100%; text-align:center; top:5px; color:white; font-size:26px; }

        .round-card {
            background: rgba(0,0,0,0.3); border: 6px solid var(--sidebar-inner);
            border-radius: 20px; padding: 10px; text-align: center;
            font-size: 40px; color: white;
        }

        #blook-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; background: rgba(0,0,0,0.2);
            padding: 10px; border-radius: 15px;
            overflow-y: auto; max-height: 400px;
        }

        .blook-slot {
            background: rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 5px; text-align: center; cursor: pointer;
            border: 4px solid transparent; transition: 0.1s;
        }
        .blook-slot:hover { background: rgba(255, 255, 255, 0.15); }
        .blook-slot.active { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }

        .f-icon-box {
            width: 60px; height: 60px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin: 0 auto 5px;
        }
        .f-cost-label { background: #3498db; color: white; display: block; border-radius: 8px; font-size: 16px; }

        /* Hacker Deck Styles */
        #hacker-deck {
            background: #000; border: 3px solid var(--hacker-green);
            padding: 10px; border-radius: 15px; color: var(--hacker-green);
            font-family: monospace; font-size: 14px;
        }
        .hack-btn {
            background: transparent; border: 1px solid var(--hacker-green);
            color: var(--hacker-green); width: 100%; padding: 5px;
            margin-top: 5px; cursor: pointer; text-transform: uppercase;
        }
        .hack-btn:hover { background: var(--hacker-green); color: black; }

        .game-btn {
            background: #3498db; border: none; border-bottom: 8px solid #2980b9;
            color: white; padding: 15px; font-size: 30px; border-radius: 20px;
            cursor: pointer; font-family: var(--ui-font);
        }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.92);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 500; gap: 30px;
        }

        #ctx-panel {
            background: rgba(0,0,0,0.9); border-radius: 20px;
            padding: 15px; display: none; flex-direction: column;
            gap: 10px; border: 4px solid #fff;
        }
    </style>
</head>
<body>

    <div id="game-scaler">
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1 style="font-size: 90px; color:white; text-shadow: 5px 5px var(--dark-purple);">FIGHTER DEFENSE</h1>
            <p style="font-size: 32px; color: #ccc;">Select Difficulty</p>
            <div style="display: flex; gap: 20px;">
                <button class="game-btn" style="background:#2ecc71; border-color:#27ae60" onclick="startGame('easy')">EASY</button>
                <button class="game-btn" onclick="startGame('normal')">NORMAL</button>
                <button class="game-btn" style="background:#e74c3c; border-color:#c0392b" onclick="startGame('hard')">HARD</button>
            </div>
        </div>

        <!-- Defeat Screen -->
        <div id="defeat-screen" class="overlay" style="display:none">
            <h1 style="font-size: 120px; color:#e74c3c">DEFEAT</h1>
            <p style="font-size: 40px; color:white">Round Reached: <span id="res-round">1</span></p>
            <button class="game-btn" style="width: 350px" onclick="location.reload()">TRY AGAIN</button>
        </div>

        <div id="header">
            <div class="gold-box"><span id="gold-val">0</span> <span style="color:#f1c40f">🪙</span></div>
        </div>

        <div id="main-container">
            <div id="canvas-holder">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div id="sidebar">
                <div class="life-bar-wrap">
                    <div id="life-fill"></div>
                    <div class="life-txt"><span id="health-val">100</span> ❤️</div>
                </div>

                <div class="round-card">Round <span id="round-val">1</span></div>

                <div id="blook-grid"></div>

                <div id="ctx-panel">
                    <div id="ctx-name" style="color:#f1c40f; font-size: 24px;">Blook</div>
                    <div id="ctx-meta" style="color:#ddd; font-size: 15px;">Level 1</div>
                    <button class="game-btn" style="font-size: 18px; padding: 10px" onclick="upgradeSelected()">UPGRADE (<span id="up-cost">0</span>)</button>
                    <div style="display: flex; gap: 5px;">
                        <button class="game-btn" style="flex:1; background:#e67e22; border-color:#d35400; font-size:16px" onclick="sellSelected()">SELL</button>
                        <button class="game-btn" style="flex:1; background:#e74c3c; border-color:#c0392b; font-size:16px" onclick="closeCtx()">CLOSE</button>
                    </div>
                </div>

                <div id="hacker-deck">
                    <div style="text-align: center; font-weight: bold; border-bottom: 1px solid;">HACKER TERMINAL</div>
                    <button class="hack-btn" onclick="hackGold()">+99M GOLD</button>
                    <button class="hack-btn" onclick="hackHealth()">GOD MODE</button>
                    <button class="hack-btn" onclick="hackNuke()">NUKE WAVE</button>
                    <button class="hack-btn" id="hyper-btn" onclick="hackHyperSpeed()">HYPER SPEED: OFF</button>
                </div>

                <button id="speed-toggle" class="game-btn" style="margin-top:auto" onclick="toggleSpeed()">
                    <span id="spd-icon">▶️</span> <span id="spd-txt">x1</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const scaler = document.getElementById('game-scaler');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gold = 500; let health = 100; let maxHealth = 100; let round = 1; let gameSpeed = 1;
        let isRunning = false; let waveActive = false; let over = false;
        let shopSelection = -1; let activeFighter = null;
        let diffMult = 1;

        let fighters = []; let enemies = []; let projectiles = [];
        const TILE = 72;
        let path = [];

        const DATA = [
            { icon: "🐥", name: "Chick", cost: 15, range: 250, dmg: 10, rate: 40, col: "#f1c40f" },
            { icon: "🐿️", name: "Squirrel", cost: 40, range: 300, dmg: 25, rate: 35, col: "#e67e22" },
            { icon: "🦍", name: "Gorilla", cost: 100, range: 350, dmg: 60, rate: 50, col: "#5f27cd" },
            { icon: "🐉", name: "Dragon", cost: 250, range: 500, dmg: 200, rate: 80, col: "#e74c3c" },
            { icon: "🦉", name: "Owl", cost: 80, range: 450, dmg: 35, rate: 30, col: "#34495e" },
            { icon: "🐱", name: "Cat", cost: 30, range: 280, dmg: 15, rate: 25, col: "#f39c12" },
            { icon: "🐷", name: "Pig", cost: 60, range: 320, dmg: 40, rate: 60, col: "#ff9ff3" },
            { icon: "🦌", name: "Deer", cost: 150, range: 400, dmg: 85, rate: 45, col: "#bdc3c7" },
            { icon: "👽", name: "Alien", cost: 500, range: 800, dmg: 1500, rate: 10, col: "#1dd1a1" }
        ];

        // FIXED SCALING LOGIC
        function resize() {
            const ww = window.innerWidth;
            const wh = window.innerHeight;
            const s = Math.min(ww/1920, wh/1080);
            scaler.style.transform = `translate(-50%, -50%) scale(${s})`;
            
            // Set internal canvas resolution properly
            canvas.width = 1920 - 380;
            canvas.height = 1080 - 75;
        }

        /** HACKS **/
        function hackGold() { gold = 99999999; updateStats(); }
        function hackHealth() { health = 999999; maxHealth = 999999; updateStats(); }
        function hackNuke() { enemies = []; }
        function hackHyperSpeed() {
            if (gameSpeed < 10) {
                gameSpeed = 10;
                document.getElementById('hyper-btn').innerText = "HYPER SPEED: ON";
                document.getElementById('spd-txt').innerText = "x10";
            } else {
                gameSpeed = 1;
                document.getElementById('hyper-btn').innerText = "HYPER SPEED: OFF";
                document.getElementById('spd-txt').innerText = "x1";
            }
        }

        function createPath() {
            path = [];
            let cx = 3, cy = 0;
            path.push({x: cx*TILE + TILE/2, y: -TILE});
            path.push({x: cx*TILE + TILE/2, y: 1*TILE + TILE/2});
            path.push({x: 15*TILE, y: 1*TILE + TILE/2});
            path.push({x: 15*TILE, y: 6*TILE});
            path.push({x: 6*TILE, y: 6*TILE});
            path.push({x: 6*TILE, y: 10*TILE});
            path.push({x: 1800, y: 10*TILE});
        }

        function startGame(mode) {
            document.getElementById('start-screen').style.display = 'none';
            if (mode === 'easy') { gold = 2000; diffMult = 0.5; health = 500; maxHealth = 500; }
            else if (mode === 'hard') { gold = 150; diffMult = 2.0; health = 50; maxHealth = 50; }
            isRunning = true;
            init();
        }

        function init() {
            const grid = document.getElementById('blook-grid');
            DATA.forEach((f, i) => {
                const d = document.createElement('div');
                d.className = 'blook-slot';
                d.onclick = () => {
                    shopSelection = i; activeFighter = null;
                    document.getElementById('ctx-panel').style.display = 'none';
                    document.querySelectorAll('.blook-slot').forEach(s => s.classList.remove('active'));
                    d.classList.add('active');
                };
                d.innerHTML = `<div class="f-icon-box" style="background:${f.col}">${f.icon}</div><span class="f-cost-label">${f.cost}</span>`;
                grid.appendChild(d);
            });
            createPath();
            updateStats();
            loop();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!isRunning || over) return;
            const rect = canvas.getBoundingClientRect();
            const s = (1920 - 380) / rect.width;
            const mx = (e.clientX - rect.left) * s;
            const my = (e.clientY - rect.top) * s;

            const gx = Math.floor(mx/TILE);
            const gy = Math.floor(my/TILE);

            const existing = fighters.find(f => f.gx === gx && f.gy === gy);
            if (existing) { openCtx(existing); return; }

            if (shopSelection !== -1) {
                const dat = DATA[shopSelection];
                if (gold >= dat.cost && gx >= 3) {
                    gold -= dat.cost;
                    fighters.push(new Fighter(gx, gy, dat));
                    updateStats();
                }
            }
        });

        function toggleSpeed() {
            gameSpeed = gameSpeed === 1 ? 3 : 1;
            document.getElementById('spd-icon').innerText = gameSpeed === 1 ? '▶️' : '⏩';
            document.getElementById('spd-txt').innerText = 'x' + gameSpeed;
        }

        function openCtx(f) {
            activeFighter = f;
            shopSelection = -1;
            document.querySelectorAll('.blook-slot').forEach(s => s.classList.remove('active'));
            document.getElementById('ctx-panel').style.display = 'flex';
            document.getElementById('ctx-name').innerText = f.data.name;
            document.getElementById('ctx-meta').innerText = `Level ${f.lvl} | Power: ${Math.round(f.data.dmg)}`;
            document.getElementById('up-cost').innerText = f.lvl * 50;
        }

        function upgradeSelected() {
            if (!activeFighter) return;
            const cost = activeFighter.lvl * 50;
            if (gold >= cost) { gold -= cost; activeFighter.lvl++; activeFighter.data.dmg *= 1.5; openCtx(activeFighter); updateStats(); }
        }

        function sellSelected() {
            if (!activeFighter) return;
            gold += activeFighter.data.cost / 2;
            fighters = fighters.filter(f => f !== activeFighter);
            closeCtx(); updateStats();
        }

        function closeCtx() { activeFighter = null; document.getElementById('ctx-panel').style.display = 'none'; }

        function updateStats() {
            document.getElementById('gold-val').innerText = Math.floor(gold);
            document.getElementById('health-val').innerText = Math.max(0, Math.floor(health));
            document.getElementById('life-fill').style.width = (health / maxHealth * 100) + "%";
            document.getElementById('round-val').innerText = round;
        }

        class Enemy {
            constructor() {
                this.x = path[0].x; this.y = path[0].y;
                this.targetIdx = 1;
                this.maxHp = (50 + round * 40) * diffMult;
                this.hp = this.maxHp;
                this.spd = 2.5 + (round * 0.1);
            }
            update() {
                const g = path[this.targetIdx];
                const dx = g.x - this.x, dy = g.y - this.y, d = Math.hypot(dx, dy);
                const step = this.spd * gameSpeed;
                if (d < step) {
                    this.targetIdx++;
                    if (this.targetIdx >= path.length) {
                        health -= 10; this.hp = 0; updateStats();
                        if (health <= 0) doGameOver();
                    }
                } else { this.x += (dx/d)*step; this.y += (dy/d)*step; }
            }
            draw() {
                ctx.font = "40px Arial"; ctx.fillText("📦", this.x - 20, this.y + 15);
                ctx.fillStyle = "red"; ctx.fillRect(this.x-20, this.y-30, 40, 5);
                ctx.fillStyle = "lime"; ctx.fillRect(this.x-20, this.y-30, 40 * (this.hp/this.maxHp), 5);
            }
        }

        class Fighter {
            constructor(gx, gy, d) {
                this.gx = gx; this.gy = gy;
                this.x = gx*TILE+TILE/2; this.y = gy*TILE+TILE/2;
                this.data = JSON.parse(JSON.stringify(d)); this.lvl = 1; this.cd = 0;
            }
            update() {
                if (this.cd > 0) this.cd -= gameSpeed;
                if (this.cd <= 0) {
                    const t = enemies.find(e => Math.hypot(e.x - this.x, e.y - this.y) < this.data.range);
                    if (t) { projectiles.push(new Projectile(this.x, this.y, t, this.data.dmg, this.data.col)); this.cd = this.data.rate; }
                }
            }
            draw() {
                ctx.fillStyle = this.data.col; ctx.beginPath(); ctx.roundRect(this.x-30, this.y-30, 60, 60, 10); ctx.fill();
                ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(this.data.icon, this.x, this.y+15);
                if (activeFighter === this) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.data.range, 0, Math.PI*2);
                    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.stroke();
                }
            }
        }

        class Projectile {
            constructor(x,y,t,dmg,col) { this.x=x;this.y=y;this.t=t;this.dmg=dmg;this.col=col;this.dead=false; }
            update() {
                const dx=this.t.x-this.x, dy=this.t.y-this.y, d=Math.hypot(dx,dy), step=15*gameSpeed;
                if (d < step) { this.t.hp -= this.dmg; gold += 1; updateStats(); this.dead = true; }
                else { this.x+=(dx/d)*step; this.y+=(dy/d)*step; }
            }
            draw() { ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,8,0,Math.PI*2); ctx.fill(); }
        }

        function doGameOver() { over = true; document.getElementById('defeat-screen').style.display = 'flex'; document.getElementById('res-round').innerText = round; }

        function loop() {
            if (!isRunning || over) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Draw Map
            for(let y=0; y<15; y++) for(let x=3; x<22; x++) {
                ctx.fillStyle = (x+y)%2===0 ? "#2ecc71" : "#27ae60";
                ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
            }
            ctx.strokeStyle="#8b4513"; ctx.lineWidth=TILE; ctx.lineCap="round"; ctx.lineJoin="round";
            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y); path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

            fighters.forEach(f => { f.update(); f.draw(); });
            enemies = enemies.filter(e => e.hp > 0);
            enemies.forEach(e => { e.update(); e.draw(); });
            projectiles = projectiles.filter(p => !p.dead && p.t.hp > 0);
            projectiles.forEach(p => { p.update(); p.draw(); });

            if (!waveActive && enemies.length === 0) {
                waveActive = true; let c=0, n = 5 + round*2;
                let t = setInterval(() => {
                    if (over) { clearInterval(t); return; }
                    enemies.push(new Enemy());
                    if (++c >= n) {
                        clearInterval(t); 
                        let ck = setInterval(() => {
                            if (enemies.length === 0) { 
                                clearInterval(ck); waveActive = false; round++; gold += 100; updateStats(); 
                            }
                        }, 500);
                    }
                }, 800 / gameSpeed);
            }
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
